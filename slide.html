<!DOCTYPE html>
<html>
<head>
    <title>RotorBalance Pro – Slides</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f7f9fc, #e6e9ef);
            margin: 0;
            padding: 30px 20px;
            text-align: center;
        }

        .nav {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #003366;
            font-weight: bold;
            font-size: 1.1em;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2em;
            font-weight: 600;
            color: #003366;
            letter-spacing: 0.5px;
        }

        /* Slide container */
        .slide-wrapper {
            position: relative;
            max-width: 900px;
            margin: 40px auto;
        }

        /* Slide image */
        .slide {
            width: 100%;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            padding: 14px;
            border: 1px solid rgba(0,0,0,0.15);
            box-shadow: 0 8px 22px rgba(0,0,0,0.18);
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .slide.active {
            display: block;
            opacity: 1;
        }

        /* Navigation arrows */
        .arrow {
            cursor: pointer;
            font-size: 2.2em;
            color: #003366;
            user-select: none;
            padding: 10px 20px;
        }

        .arrow:hover {
            color: #0055aa;
        }

        .controls {
            margin-top: 20px;
        }

        .counter {
            margin-top: 10px;
            font-size: 1.1em;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="slides.html">Slides</a>
    </div>

    <h1>Presentation Slides</h1>

    <div class="slide-wrapper">

        <!-- SLIDES -->
        <img src="assets/images/slides/CoverTBD.JPG" class="slide active" alt="Slide 1">
        <img src="assets/images/slides/Home.JPG" class="slide" alt="Slide 2">
