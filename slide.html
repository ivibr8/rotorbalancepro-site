<!DOCTYPE html>
<html>
<head>
    <title>RotorBalance Pro – Slides</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f7f9fc, #e6e9ef);
            margin: 0;
            padding: 30px 20px;
            text-align: center;
        }

        .nav {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #003366;
            font-weight: bold;
            font-size: 1.1em;
        }

        /* Slide container */
        .slide-wrapper {
            position: relative;
            max-width: 900px;
            margin: 40px auto;
        }

        /* Slide image */
        .slide {
            width: 100%;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            padding: 14px;
            border: 1px solid rgba(0,0,0,0.15);
            box-shadow: 0 8px 22px rgba(0,0,0,0.18);
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .slide.active {
            display: block;
            opacity: 1;
        }

        /* Navigation arrows */
        .arrow {
            cursor: pointer;
            font-size: 2.2em;
            color: #003366;
            user-select: none;
            padding: 10px 20px;
        }

        .arrow:hover {
            color: #0055aa;
        }

        .controls {
            margin-top: 20px;
        }

        .counter {
            margin-top: 10px;
            font-size: 1.1em;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">Home</a>
    </div>

    <div class="slide-wrapper">

        <!-- SLIDES -->
        <img src="assets/images/slides/CoverTBD.JPG" class="slide active" alt="Slide 1">
        <img src="assets/images/slides/Home.JPG" class="slide" alt="Slide 2">
        <img src="assets/images/slides/SinglePlane.JPG" class="slide" alt="Slide 3">
        <img src="assets/images/slides/TwoPlane.JPG" class="slide" alt="Slide 4">
        <img src="assets/images/slides/4Run.JPG" class="slide" alt="Slide 5">
        <img src="assets/images/slides/WtMgr.JPG" class="slide" alt="Slide 6">
        <img src="assets/images/slides/Severity.JPG" class="slide" alt="Slide 7">
        <img src="assets/images/slides/TWEst.JPG" class="slide" alt="Slide 8">

    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <span class="arrow" id="prev">&#8592; Prev</span>
        <span class="arrow" id="next">Next &#8594;</span>
    </div>

    <div class="counter" id="counter">Slide 1 of 8</div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const counter = document.getElementById('counter');
        let current = 0;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === index) slide.classList.add('active');
            });
            counter.textContent = `Slide ${index + 1} of ${slides.length}`;
        }

        document.getElementById('next').onclick = () => {
            current = (current + 1) % slides.length;
            showSlide(current);
        };

        document.getElementById('prev').onclick = () => {
            current = (current - 1 + slides.length) % slides.length;
            showSlide(current);
        };
