<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RotorBalance Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f7f9fc, #e6e9ef);
            margin: 0;
            padding: 30px 20px;
            text-align: center;
        }

        /* HERO IMAGE WRAPPER */
        .hero-wrapper {
            position: relative;
            display: inline-block;
            width: 80%;
            max-width: 900px;
        }

        .hero-image {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.18);
            display: block;
        }

        /* INVISIBLE CLICKABLE HOTSPOT */
        .hotspot {
            position: absolute;
            left: 14%;
            bottom: 38%;
            transform: translate(-50%, 50%);
            width: 220px;
            height: 80px;


</body>
</html>
