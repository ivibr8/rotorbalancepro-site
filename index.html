<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RotorBalance Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f7f9fc, #e6e9ef);
            margin: 0;
            padding: 30px 20px;
            text-align: center;
        }

        /* HERO IMAGE WRAPPER */
        .hero-wrapper {
            position: relative;
            display: inline-block;
            width: 80%;
            max-width: 900px;
        }

        .hero-image {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.18);
            display: block;
        }

        /* INVISIBLE CLICKABLE HOTSPOT */
        .hotspot {
            position: absolute;

            /* Position based on your engineering coordinates */
            left: 14%;
            bottom: 38%;

            /* Center the hotspot on that point */
            transform: translate(-50%, 50%);

            /* Size of the clickable area (adjustable) */
            width: 220px;
            height: 80px;

            /* Invisible but clickable */
            background: rgba(255, 255, 255, 0);
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #555;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

    <!-- HERO IMAGE WITH INVISIBLE CLICKABLE HOTSPOT -->
    <div class="hero-wrapper">
        <img src="assets/images/slides/Hero_Copilot.png" alt="RotorBalance Pro" class="hero-image">

        <!-- INVISIBLE BUTTON OVER THE EMBEDDED OVAL -->
        <a href="slide.html" class="hotspot"></a>
    </div>

    <footer>
        © 2026 RotorBalance Pro — All Rights Reserved
    </footer>

</body>
</html>
